name: ebdresults
version: 1.0.0
publish_to: 'none'
description: A simple University Directory App demo.

environment:
  sdk: '>=2.17.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.0
  provider: ^6.1.1
  webview_flutter: ^4.4.2
  cached_network_image: ^3.3.1
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^17.0.0
  url_launcher: ^6.2.5
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
